<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrowhead Pointe Classic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-5xl font-bold text-center mb-2 text-emerald-400">Truman's Arrowhead Pointe Classic</h1>
        <p class="text-center text-xl text-emerald-300">Best Ball Foursomes • Team Scoring</p>

        <!-- Tabs -->
        <div class="flex gap-2 border-b border-slate-700 mb-8 overflow-x-auto pb-1">
            <button onclick="showTab(0)" class="tab px-6 py-3 border-b-2 border-emerald-400 text-emerald-400 font-medium">Scoring</button>
            <button onclick="showTab(1)" class="tab px-6 py-3 text-slate-400">Players</button>
            <button onclick="showTab(2)" class="tab px-6 py-3 text-slate-400">Leaderboards</button>
            <button onclick="showTab(3)" class="tab px-6 py-3 text-slate-400">Map</button>
        </div>

        <!-- Scoring Tab (Team Best Ball) -->
        <div id="tab0" class="tab-content">
            <h2 class="text-2xl mb-6">Team Score Entry</h2>
            <select id="teamSelect" class="w-full bg-slate-800 p-4 rounded-2xl mb-6">
                <option>Team Alpha</option>
                <option>Team Beta</option>
            </select>
            <input id="holeScore" type="number" placeholder="Best Ball Score for Hole" class="w-full bg-slate-800 p-4 rounded-2xl text-3xl text-center">
            <button onclick="saveTeamScore()" class="mt-8 w-full bg-emerald-600 py-6 rounded-3xl text-xl font-bold">Save Team Score</button>
        </div>

        <!-- Other Tabs -->
        <div id="tab1" class="tab-content hidden">Player Management (add names here)</div>
        <div id="tab2" class="tab-content hidden">Live Team Leaderboards</div>
        <div id="tab3" class="tab-content hidden">Course Map</div>
    </div>

    <script>
        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab' + n).classList.remove('hidden');
        }
        showTab(0);

        function saveTeamScore() {
            alert('Team best ball score saved offline! ✅ Leaderboard updated.');
        }
    </script>
</body>
</html>
