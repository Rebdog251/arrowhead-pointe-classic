<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrowhead Pointe Classic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-5xl font-bold text-center mb-2 text-emerald-400">Truman's Arrowhead Pointe Classic</h1>
        <p class="text-center text-xl text-emerald-300">Best Ball Foursomes • 16 Players</p>

        <!-- Tabs -->
        <div class="flex gap-2 border-b border-slate-700 mb-8 overflow-x-auto">
            <button onclick="showTab(0)" class="tab px-6 py-3 border-b-2 border-emerald-400 text-emerald-400">Scoring</button>
            <button onclick="showTab(1)" class="tab px-6 py-3 text-slate-400">Players</button>
            <button onclick="showTab(2)" class="tab px-6 py-3 text-slate-400">Contacts</button>
            <button onclick="showTab(3)" class="tab px-6 py-3 text-slate-400">Rules</button>
            <button onclick="showTab(4)" class="tab px-6 py-3 text-slate-400">Mixing</button>
            <button onclick="showTab(5)" class="tab px-6 py-3 text-slate-400">Misc</button>
            <button onclick="showTab(6)" class="tab px-6 py-3 text-slate-400">Course</button>
            <button onclick="showTab(7)" class="tab px-6 py-3 text-slate-400">Payouts</button>
        </div>

        <!-- Scoring -->
        <div id="tab0" class="tab-content">
            <h2 class="text-2xl mb-6">Team Best Ball Scoring</h2>
            <select id="team" class="w-full bg-slate-800 p-4 rounded-2xl mb-6"></select>
            <input id="score" type="number" placeholder="Team Score for Hole" class="w-full bg-slate-800 p-4 rounded-2xl text-3xl text-center">
            <button onclick="saveScore()" class="mt-8 w-full bg-emerald-600 py-6 rounded-3xl text-xl font-bold">Save Team Score</button>
        </div>

        <!-- Other tabs with placeholders for brevity -->
        <div id="tab1" class="tab-content hidden">Player Management</div>
        <div id="tab2" class="tab-content hidden">Contacts List</div>
        <div id="tab3" class="tab-content hidden">Tournament Rules</div>
        <div id="tab4" class="tab-content hidden">Foursome Mixing Tool</div>
        <div id="tab5" class="tab-content hidden">Tee Times & Meals</div>
        <div id="tab6" class="tab-content hidden">Course Layout</div>
        <div id="tab7" class="tab-content hidden">Payout Distribution ($320/day)</div>
    </div>

    <script>
        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab' + n).classList.remove('hidden');
        }
        showTab(0);

        function saveScore() {
            alert('Team score saved! ✅');
        }
    </script>
</body>
</html>
