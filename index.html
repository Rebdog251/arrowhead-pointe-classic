<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrowhead Pointe Classic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-5xl font-bold text-center mb-2 text-emerald-400">Truman's Arrowhead Pointe Classic</h1>
        <p class="text-center text-xl text-emerald-300">Best Ball Foursomes • 16 Players</p>

        <div class="flex gap-2 border-b border-slate-700 mb-8 overflow-x-auto">
            <button onclick="showTab(0)" class="tab px-6 py-3 border-b-2 border-emerald-400 text-emerald-400">Scoring</button>
            <button onclick="showTab(1)" class="tab px-6 py-3 text-slate-400">Players</button>
            <button onclick="showTab(2)" class="tab px-6 py-3 text-slate-400">Map</button>
        </div>

        <div id="tab0" class="tab-content">
            <h2>Team Scoring</h2>
            <p>Best Ball - Enter team score per hole</p>
        </div>

        <div id="tab2" class="tab-content hidden">
            <h2>Course Map</h2>
            <select onchange="showHole(this.value)" class="w-full p-4 bg-slate-800 rounded-2xl">
                <option value="1">Hole 1 - Par 4 - 410 yds</option>
                <option value="18">Hole 18 - Longest Drive</option>
            </select>
        </div>
    </div>

    <script>
        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab' + n).classList.remove('hidden');
        }
        function showHole(hole) {
            alert(`Hole ${hole} selected`);
        }
        showTab(0);
    </script>
</body>
</html>
