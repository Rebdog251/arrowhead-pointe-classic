<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrowhead Pointe Classic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-5xl font-bold text-center mb-2 text-emerald-400">Truman's Arrowhead Pointe Classic</h1>
        <div class="text-center">
            <select id="daySelect" class="bg-slate-800 p-3 rounded-2xl">
                <option value="1">Day 1</option>
                <option value="2">Day 2</option>
                <option value="3">Day 3</option>
            </select>
        </div>

        <!-- Tabs -->
        <div class="flex gap-2 border-b border-slate-700 mb-8 overflow-x-auto">
            <button onclick="showTab(0)" class="tab px-6 py-3 border-b-2 border-emerald-400 text-emerald-400">Scoring</button>
            <button onclick="showTab(1)" class="tab px-6 py-3 text-slate-400">Players</button>
            <button onclick="showTab(2)" class="tab px-6 py-3 text-slate-400">Contacts</button>
            <button onclick="showTab(3)" class="tab px-6 py-3 text-slate-400">Mixing</button>
            <button onclick="showTab(4)" class="tab px-6 py-3 text-slate-400">Map</button>
        </div>

        <!-- Scoring -->
        <div id="tab0" class="tab-content">
            <h2 class="text-2xl mb-6">Team Best Ball - Day <span id="currentDay">1</span></h2>
            <!-- Team scoring form -->
        </div>

        <!-- Players, Contacts, Mixing, Map tabs with dynamic content -->
        <div id="tab2" class="tab-content hidden">
            <h2 class="text-2xl mb-6">Player Contacts</h2>
            <div id="contactsList"></div>
        </div>

        <!-- Map Tab -->
        <div id="tab4" class="tab-content hidden">
            <h2 class="text-2xl mb-6">Course Holes</h2>
            <select onchange="showHole(this.value)" class="w-full bg-slate-800 p-4 rounded-2xl">
                <option value="1">Hole 1 - Par 4</option>
                <!-- More holes -->
            </select>
        </div>
    </div>

    <script>
        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab' + n).classList.remove('hidden');
        }
        // Add more logic for mixing and contacts as needed
        showTab(0);
    </script>
</body>
</html>
