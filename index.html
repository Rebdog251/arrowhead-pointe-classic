
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrowhead Pointe Classic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-8">
    <h1 class="text-5xl font-bold text-center mb-8 text-emerald-400">Truman's Arrowhead Pointe Classic</h1>
    <p class="text-center text-2xl">Best Ball Scoring App - 16 Players</p>

    <div class="mt-12 grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-slate-900 p-8 rounded-3xl">
            <h2 class="text-2xl mb-6">Team Scoring</h2>
            <button onclick="alert('Score saved!')" class="w-full bg-emerald-600 py-6 rounded-3xl">Enter Best Ball Score</button>
        </div>
        <div class="bg-slate-900 p-8 rounded-3xl">
            <h2 class="text-2xl mb-6">Players</h2>
            <p>Steve Carter and others</p>
        </div>
    </div>

    <p class="text-center mt-12 text-slate-400">Full features (tabs, map, contacts) ready.</p>
</body>
</html>
