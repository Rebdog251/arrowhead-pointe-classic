<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrowhead Pointe Classic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-4xl mx-auto p-6">
        <div id="tabMap" class="tab-content">
            <h2 class="text-2xl mb-6">Full Course Map - 18 Holes</h2>
            <select onchange="showHole(this.value)" class="w-full bg-slate-800 p-4 rounded-2xl mb-6">
                <option value="1">Hole 1 - Par 4 - Blue 410 yds</option>
                <option value="2">Hole 2 - Par 5 - Blue 520 yds</option>
                <!-- ... all 18 ... -->
                <option value="18">Hole 18 - Par 4 - Longest Drive</option>
            </select>
            <div id="holeDetails" class="bg-slate-900 p-6 rounded-3xl"></div>
        </div>
    </div>

    <script>
        const holes = {
            1: "Par 4 - Blue 410 yds - White 380 yds",
            18: "Par 4 - Longest Drive Contest"
            // Add all 18 here
        };
        function showHole(hole) {
            document.getElementById('holeDetails').innerHTML = `<p>Hole ${hole}: ${holes[hole] || 'Details coming'}</p>`;
        }
    </script>
</body>
</html>
